name: CICD Pipeline

on:
  push:
    branches:
      - "main"

jobs:
  compile:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B --file pom.xml

  security-checks:
    runs-on: self-hosted
    needs: compile
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      # Restores the cached .m2 directory from the compile job so Trivy doesn't hit Maven Central
      - name: Set up JDK 17 (Restore Dependency Cache)
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # Executes Trivy filesystem scan using the official action
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'json'
          output: 'fs-report.json'
          scan-ref: '.'

      # Executes Gitleaks secret detection using the official action
      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tests:
    runs-on: self-hosted
    needs: compile

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Unit Test Cases
        run: mvn test
